<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-body">

    <!-- Botão de Modo Noturno / Claro -->
    <button class="btn-theme-toggle login-theme-toggle" onclick="toggleTheme()" title="Alternar Tema">
        <i data-lucide="sun" id="theme-icon"></i>
    </button>

    <!-- ================= TELA: LOGIN ================= -->
    <div id="tela-login" class="login-container">
        <div class="login-header">
            <div class="nav-brand">
                <i data-lucide="book-open"></i>
                <text>Biblioteca</text>
            </div>
            <p>Entre com suas credenciais para acessar o sistema</p>
        </div>

        <!-- Formulário controlado pelo JavaScript para validação de contas dinâmicas -->
        <form id="form-login">
            <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-with-icon">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="nome@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="input-with-icon">
                    <i data-lucide="lock"></i>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>
                <div class="login-password-helper">
                    <button type="button" class="login-link" onclick="mostrarTelaLogin('esqueci')">Esqueceu a senha?</button>
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block">Acessar Sistema</button>
        </form>

        <div class="login-footer">
            <span>Não tem uma conta? <button type="button" class="login-link" onclick="mostrarTelaLogin('cadastro')">Solicitar cadastro</button></span>
        </div>
    </div>

<!-- ================= TELA: SOLICITAR CADASTRO ================= -->
    <div id="tela-cadastro" class="login-container login-container-wide" style="display: none;">
        <div class="login-header">
            <div class="login-logo-box">
                <i data-lucide="book-open"></i>
            </div>
            <h2>Solicitar Cadastro</h2>
            <p>Apenas para novos leitores ou renovação de cadastros bloqueados</p>
        </div>

        <form id="form-solicitar-cadastro" class="form-grid-two-columns">
            <div class="form-column">
                <div class="input-group">
                    <label for="cad-nome">Nome completo</label>
                    <input type="text" id="cad-nome" placeholder="Ex: Ricardo Alves" minlength="3" required>
                </div>

                <div class="input-group">
                    <label for="cad-email">E-mail institucional</label>
                    <input type="email" id="cad-email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="cad-cpf">CPF</label>
                    <input type="text" id="cad-cpf" placeholder="000.000.000-00" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o CPF no formato 000.000.000-00" required>
                </div>
            </div>

            <div class="form-column">
                <div class="input-group">
                    <label for="cad-telefone">Telefone</label>
                    <input type="text" id="cad-telefone" placeholder="(00) 00000-0000" maxlength="15" pattern="\(\d{2}\)\s\d{5}-\d{4}" title="Digite o telefone no formato (00) 00000-0000" required>
                </div>

                <div class="input-group">
                    <label for="cad-perfil">Perfil de acesso solicitado</label>
                    <select id="cad-perfil" class="select-input" required>
                        <option value="leitor">Novo Leitor</option>
                        <option value="renovacao">Renovação de Cadastro Bloqueado</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="cad-foto">URL da Foto de Perfil (opcional)</label>
                    <input type="url" id="cad-foto" placeholder="https://exemplo.com/sua-foto.jpg">
                </div>
            </div>

            <div class="form-full-width" style="grid-column: span 2; width: 100%;">
                <div class="input-group">
                    <label for="cad-mensagem">Mensagem (opcional)</label>
                    <textarea id="cad-mensagem" class="textarea-input" placeholder="Informe o motivo ou contexto da sua solicitação..."></textarea>
                </div>

                <button type="submit" class="btn-primary btn-block btn-with-icon">
                    <i data-lucide="send" class="icon-small"></i> Enviar solicitação
                </button>
            </div>
        </form>

        <div class="login-footer">
            <button type="button" class="link-back" onclick="mostrarTelaLogin('login')">Voltar ao login</button>
        </div>
    </div>

    <!-- ================= TELA: ESQUECI A SENHA ================= -->
    <div id="tela-esqueci-senha" class="login-page-block" style="display: none;">
        <div class="login-brand-standalone">
            <div class="login-logo-box">
                <i data-lucide="book-open"></i>
            </div>
            <h1>Biblioteca</h1>
            <p>Sistema de Gestão de Acervo</p>
        </div>

        <div class="login-container">
            <div class="login-header login-header-left">
                <h2>Recuperar Senha</h2>
                <p>Informe seu email para receber o link de recuperação.</p>
            </div>

            <form onsubmit="event.preventDefault();">
                <div class="input-group">
                    <input type="email" id="rec-email" placeholder="seu@email.com" required>
                </div>

                <button type="submit" class="btn-primary btn-block">Enviar link</button>
            </form>

            <div class="login-footer">
                <button type="button" class="link-back" onclick="mostrarTelaLogin('login')">Voltar ao login</button>
            </div>
        </div>
    </div>

    <!-- Scripts de controle visual e lógica de autenticação com Firebase -->
    <script src="js/script.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
